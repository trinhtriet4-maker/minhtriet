<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Thành Viên - FASHION HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">FASHION HUB</div>
        <nav>
            <a href="index.html">Trang Chủ</a>
            <a href="trends.html">Xu Hướng</a>
            <a href="events.html">Sự Kiện</a>
            <a href="login.html" class="active">Thành Viên</a>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Đăng Nhập</h2>
            <form id="loginForm" onsubmit="validateLogin(event)">
                <div class="form-group">
                    <label for="email">Email thành viên</label>
                    <input type="email" id="email" placeholder="example@fashion.com">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••">
                    <div class="error-msg" id="errorMsg">Vui lòng điền đầy đủ thông tin!</div>
                </div>
                <button type="submit" class="btn-login">Vào hệ thống</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
