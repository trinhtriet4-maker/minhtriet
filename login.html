<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREET CHIC - Đăng Nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="brand-logo">STREET<span>CHIC</span></div>
        <nav class="nav-bar">
            <ul class="menu-links">
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="news.html">Tin Tức & Sự Kiện</a></li>
                <li><a href="trends-beauty.html">Xu Hướng & Làm Đẹp</a></li>
                <li><a href="login.html" class="active-link">Thành Viên</a></li>
                <li><a href="sitemap.html">Sitemap</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-center">
        <div class="auth-card">
            <h2>MEMBER PORTAL</h2>
            <p class="auth-sub">Đăng nhập để nhận các bản tin xu hướng sớm nhất</p>
            <form id="auth-form" class="modern-form">
                <div class="input-box">
                    <input type="email" id="auth-email" required placeholder="Địa chỉ Email">
                </div>
                <div class="input-box">
                    <input type="password" id="auth-password" required placeholder="Mật khẩu bí mật">
                </div>
                <button type="submit" class="submit-btn" style="width:100%;">Vào Hệ Thống</button>
            </form>
            <div class="back-link-box">
                <a href="index.html">← Quay lại trang chủ đọc tin</a>
            </div>
        </div>
    </main>

    <footer class="main-footer" style="position: fixed; bottom: 0; width: 100%;">
        <p>&copy; 2026 STREET CHIC Project.</p>
    </footer>

    <script>
        document.getElementById('auth-form')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Đăng nhập client-side thành công!');
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
